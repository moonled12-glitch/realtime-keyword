name: Update trends data

on:
  schedule:
    - cron: "*/10 * * * *"  # 10분마다 (UTC) — GitHub 부하 시 지연/건너뜀 가능
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write

# 동시에 여러 실행이 겹쳐 push 충돌 나는 것 방지
concurrency:
  group: update-trends
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install AI summary deps
        run: pip install --quiet anthropic

      - name: Generate latest index.html
        env:
          # 네이버 데이터랩 API 키 (없으면 자동으로 signal.bz 폴백)
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # AI 요약용 Claude 키 (없으면 요약 생성 건너뜀, 캐시된 요약만 표시)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUMMARY_MODEL: ${{ vars.SUMMARY_MODEL }}   # 미설정 시 claude-haiku-4-5
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html prev.json summaries.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-update trends ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
