name: Update trends data

on:
  schedule:
    - cron: "*/20 * * * *"  # 20분마다 (UTC) — Gemini 무료 한도 여유. 부하 시 지연 가능
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write

# 동시에 여러 실행이 겹쳐 push 충돌 나는 것 방지
concurrency:
  group: update-trends
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps (AI summary + blog build)
        run: pip install --quiet google-genai markdown

      - name: Generate latest index.html
        env:
          # 네이버 데이터랩 API 키 (없으면 자동으로 signal.bz 폴백)
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # AI 요약용 Gemini 무료 키 (없으면 요약 생성 건너뜀, 캐시된 요약만 표시)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUMMARY_MODEL: ${{ vars.SUMMARY_MODEL }}   # 미설정 시 gemini-flash-lite-latest
          ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }} # 홈 광고/자동광고 (승인 후 ca-pub-… 설정)
        run: python generate.py

      - name: Generate blog drafts (사람이 편집·발행)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUMMARY_MODEL: ${{ vars.SUMMARY_MODEL }}
        run: python draft_articles.py

      - name: Build blog from posts/
        env:
          ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }}   # 승인 후 ca-pub-… 설정 시 광고 로더 삽입
        run: python build_blog.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # posts/ 는 자동 커밋 안 함(사용자가 직접 발행). drafts/blog/부속 파일만.
          git add index.html prev.json summaries.json drafts blog sitemap.xml rss.xml privacy.html about.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-update ($(date -u +%Y-%m-%dT%H:%MZ))"
            # remote가 앞서 있을 수 있음(관리자 이미지 업로드 등) → rebase 후 push, 충돌 대비 재시도
            for i in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                echo "pushed on attempt $i"; break
              fi
              echo "push rejected, rebasing (attempt $i)"
              git pull --rebase --autostash origin main || true
              sleep 3
            done
          fi
