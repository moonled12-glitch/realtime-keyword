  header{text-align:center; padding:22px 0 16px;}
  .logo{font-size:26px; font-weight:800; letter-spacing:-.5px;}
  .logo .dot{color:var(--accent);}
  .live{

    font-size:13px; color:var(--sub); background:var(--card);

  }

  }

    0%{box-shadow:0 0 0 0 rgba(255,90,60,.55);}
    70%{box-shadow:0 0 0 7px rgba(255,90,60,0);}
    100%{box-shadow:0 0 0 0 rgba(255,90,60,0);}
  }

  .livewrap{display:inline-flex; align-items:center; gap:8px; margin-top:10px;}
  .livewrap .live{margin-top:0;}
  .themebtn{
    width:30px; height:30px; flex:0 0 auto; border-radius:50%;
    border:1px solid var(--line); background:var(--card); color:var(--txt);
    cursor:pointer; font-size:14px; line-height:1; padding:0;
    display:inline-flex; align-items:center; justify-content:center; transition:.15s;
  }
  .themebtn:hover{border-color:var(--accent);}
  .themebtn:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* 상단 네비 */
  .nav{display:flex; gap:14px; align-items:center; padding:12px 0 14px;
    border-bottom:1px solid var(--line); font-size:14px; font-weight:600;}

  .nav .brand .dot{color:var(--accent);}
  .nav a{color:var(--sub); text-decoration:none;}
  .nav a:hover, .nav a.active{color:var(--txt);}
  header{text-align:center; padding:18px 0 12px;}

  /* 탭 */
  .tabs{display:flex; gap:8px; margin:8px 0 12px;}
  .tab{
    flex:1 1 0; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:11px 8px; border-radius:12px; cursor:pointer; user-select:none;
    background:var(--card); border:1px solid var(--line);
    font-size:15px; font-weight:700; color:var(--sub); transition:.15s;
  }

  .tab[data-tab="google"] .ic{background:var(--google);}
  .tab[data-tab="naver"] .ic{background:var(--naver);}
  .tab.active{color:var(--txt); background:var(--card2);}
  .tab[data-tab="google"].active{border-color:var(--google);}
  .tab[data-tab="naver"].active{border-color:var(--naver);}
  .tab:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .meta{display:flex; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--sub); margin:2px 4px 10px;}
  .meta b{color:var(--txt); font-weight:600;}

  ul.board{list-style:none; display:flex; flex-direction:column; gap:8px;}
  ul.board[hidden]{display:none;}
  li.row{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    overflow:hidden; transition:border-color .15s;
  }
  li.row:hover{border-color:#33405a;}
  .head{display:flex; align-items:center; gap:12px; padding:13px 14px; cursor:pointer;}
  .head:focus-visible{outline:2px solid var(--accent); outline-offset:-2px;}

    font-variant-numeric:tabular-nums;
  }
  .board.g li.row:nth-child(-n+3) .rank{color:var(--google);}
  .board.n li.row:nth-child(-n+3) .rank{color:var(--naver);}
  .kw{flex:1 1 auto; min-width:0;}
  .kw .word{font-size:16px; font-weight:600; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;}
  .vol{flex:0 0 auto; font-size:12px; color:var(--sub); white-space:nowrap; text-align:right;}
  .move{flex:0 0 auto; display:flex; align-items:center; gap:3px;

    color:var(--txt); text-decoration:none; border-bottom:1px solid var(--line);}

  .nt{flex:1 1 auto; min-width:0; font-size:13.5px; line-height:1.4; display:-webkit-box;

  .ad-note{display:block; font-size:10px; color:var(--sub); letter-spacing:.4px; margin-bottom:4px;}
  .rail{position:fixed; top:80px; width:160px; z-index:5; text-align:center;
    background:var(--card); border:1px dashed var(--line); border-radius:10px; padding:8px 6px;}

  .rail-right{right:calc(50% - 540px);}
  .rail .adsbygoogle{display:inline-block; width:160px; height:600px;}

function moveHTML(it){
  if(it.move === "new") return '<span class="badge-new">NEW</span>';
  if(it.move === "up")   return '<span class="move up">▲ '+it.delta+'</span>';
  if(it.move === "down") return '<span class="move down">▼ '+it.delta+'</span>';
  return '<span class="move same">–</span>';
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function naverSearch(kw){return 'https://search.naver.com/search.naver?query='+encodeURIComponent(kw);}
function googleSearch(kw){return 'https://www.google.com/search?q='+encodeURIComponent(kw);}

function rowHTML(it, kind){
  const news = (it.news||[]).map(n=>`
      <a class="news" href="${esc(n.url)}" target="_blank" rel="noopener">
        ${n.image ? `<img class="thumb" src="${esc(n.image)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()">` : ""}
        <div class="nt">${esc(n.title)}<div class="src">${esc(n.source)}</div></div>
      </a>`).join("");
  const links = kind === "google"
    ? `<a href="${naverSearch(it.keyword)}" target="_blank" rel="noopener">네이버 검색 →</a>
       <a href="${googleSearch(it.keyword)}" target="_blank" rel="noopener">구글 검색 →</a>`
    : `<a href="${naverSearch(it.keyword)}" target="_blank" rel="noopener">네이버 검색 →</a>
       <a href="${googleSearch(it.keyword)}" target="_blank" rel="noopener">구글 검색 →</a>`
      + (it.summary ? `<a href="${esc(it.summary)}" target="_blank" rel="noopener">AI 요약 보기 →</a>` : "");
  const body = (!it.news || !it.news.length)
    ? '<div class="src" style="padding:6px 0;">관련 뉴스가 없어요.</div>' : news;
  const vol = kind === "google"
    ? `<div class="vol">검색량 ${esc(it.traffic)||'–'}</div>`
    : (it.metric ? `<div class="vol">${esc(it.metric)}</div>` : "");
  return `
    <li class="row">
      <div class="head" tabindex="0" role="button" aria-expanded="false"
           onclick="toggleRow(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="rank">${it.rank}</div>
        <div class="kw"><div class="word">${esc(it.keyword)}</div></div>
        ${vol}
        ${moveHTML(it)}
        <div class="caret">▾</div>
      </div>
      <div class="panel"><div class="panel-inner">
        ${it.aiSummary ? `<div class="ai"><span class="ai-tag">🤖 AI 요약</span>${esc(it.aiSummary)}</div>` : ""}
        ${body}
        <div class="links">${links}<button type="button" class="closebtn" onclick="closeRow(this)">닫기 ▲</button></div>
      </div></div>
    </li>`;
}

function toggleRow(head){
  const li = head.parentElement;
  const board = li.closest('.board');
  const wasOpen = li.classList.contains('open');
  // 아코디언: 같은 보드에서 열린 항목 모두 닫기
  board.querySelectorAll('li.open').forEach(o=>{
    o.classList.remove('open');
    o.querySelector('.head').setAttribute('aria-expanded','false');
  });
  if(!wasOpen){
    li.classList.add('open');
    head.setAttribute('aria-expanded','true');
  }
}

// 패널 닫기 버튼
function closeRow(btn){
  const li = btn.closest('li.row');
  if(!li) return;
  li.classList.remove('open');
  const h = li.querySelector('.head');
  if(h) h.setAttribute('aria-expanded','false');
}

// 보드의 1위를 기본으로 펼침
function openFirst(id){
  const li = document.querySelector('#'+id+' li.row');
  if(li){
    li.classList.add('open');
    const h = li.querySelector('.head');
    if(h) h.setAttribute('aria-expanded','true');
  }
}

function renderBoard(id, items, kind){
  const el = document.getElementById(id);
  el.innerHTML = (items||[]).length
    ? items.map(it=>rowHTML(it, kind)).join("")
    : '<li class="row"><div class="head"><div class="kw"><div class="word" style="color:var(--sub);font-weight:500">데이터를 불러오지 못했어요.</div></div></div></li>';
}

function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>{
    const on = t.dataset.tab === name;
    t.classList.toggle('active', on);
    t.setAttribute('aria-selected', on);
  });
  document.getElementById('board-google').hidden = name !== 'google';
  document.getElementById('board-naver').hidden  = name !== 'naver';
  document.getElementById('srcinfo').textContent = SRC[name];
}

showTab('google');

// 다크/라이트 테마 토글
function currentTheme(){
  return document.documentElement.getAttribute('data-theme')
    || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem('theme', t); }catch(e){}
  document.getElementById('themeToggle').textContent = (t === 'dark') ? '🌙' : '☀️';
}
(function initTheme(){
  const btn = document.getElementById('themeToggle');
  btn.textContent = (currentTheme() === 'dark') ? '🌙' : '☀️';
  btn.addEventListener('click', ()=> applyTheme(currentTheme() === 'dark' ? 'light' : 'dark'));
})();

// 정적 페이지가 GitHub Actions로 갱신되므로 5분마다 새로고침해 최신 데이터 반영
setTimeout(()=>location.reload(), 5*60*1000);
</script>
