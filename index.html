  /* ===== 테마 토큰 (라이트) ===== */
  :root{
    --bg:#f1f3f4; --surface:#ffffff; --text:#191c1f; --muted:#767b80;
    --border:#e5e8ea; --accent:#0b7d63; --accent-soft:#e6f4ef;
    --up:#e2452f; --down:#1f8a5b; --adbg:#f0f2f3;
    --shadow:0 1px 3px rgba(20,30,40,.06);
  }
  /* ===== 다크 테마 ===== */
  html[data-theme="dark"]{
    --bg:#12151a; --surface:#1a1e25; --text:#e9ebee; --muted:#8b9299;
    --border:#2a2f38; --accent:#2fbf8f; --accent-soft:#12281f; --adbg:#181b21;
    --shadow:0 1px 3px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:'Noto Sans KR',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    transition:background .25s,color .25s;}
  a{color:inherit;}
  @keyframes kpPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.82)}}
  @keyframes kpFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .wrap{max-width:1080px;margin:0 auto;padding:0 20px;}
  /* 광고 자리 */
  .ad-top{width:100%;display:flex;justify-content:center;padding:8px 20px 0;}
  .ad-top>div{width:100%;max-width:970px;height:56px;background:var(--adbg);
    border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;
    justify-content:center;color:var(--muted);font-size:11px;letter-spacing:.14em;
    font-family:ui-monospace,monospace;}
  .ad-side{height:250px;background:var(--adbg);border:1px dashed var(--border);border-radius:14px;
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;
    letter-spacing:.14em;font-family:ui-monospace,monospace;}

  /* 헤더 */
  header{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--border);}
  header .wrap{display:flex;align-items:center;gap:20px;padding-top:11px;padding-bottom:11px;}
  .logo{text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .logo .mark{width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;
    font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .logo .name{font-weight:900;font-size:19px;letter-spacing:-.02em;}
  nav.main{display:flex;gap:2px;margin-left:6px;}
  nav.main a{text-decoration:none;font-size:14px;font-weight:500;color:var(--muted);
    padding:7px 12px;border-radius:8px;}
  nav.main a:hover{background:var(--bg);}
  nav.main a.active{color:var(--accent);font-weight:700;background:var(--accent-soft);}
  .theme-btn{margin-left:auto;width:36px;height:36px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface);color:var(--text);cursor:pointer;font-size:15px;display:flex;
    align-items:center;justify-content:center;}
  .theme-btn:hover{background:var(--bg);}

  /* 히어로 */
  .hero{background:var(--surface);border-bottom:1px solid var(--border);}
  .hero .wrap{padding-top:34px;padding-bottom:32px;display:flex;align-items:center;justify-content:center;gap:28px;}
  .hero-mid{display:flex;flex-direction:column;align-items:center;text-align:center;animation:kpFade .5s ease both;}
  .hero-ad{flex:0 0 300px;width:300px;height:250px;background:var(--adbg);border:1px dashed var(--border);
    border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);
    font-size:11px;letter-spacing:.14em;font-family:ui-monospace,monospace;}
  @media(max-width:980px){ .hero-ad{display:none;} .hero .wrap{gap:0;} }
  .badge-live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;
    color:var(--accent);background:var(--accent-soft);padding:5px 12px;border-radius:999px;}
  .badge-live .dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:kpPulse 1.6s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){ .badge-live .dot{animation:none;} }
  .hero h1{font-weight:900;font-size:clamp(30px,5vw,44px);letter-spacing:-.03em;margin:16px 0 10px;}
  .hero p{font-size:15px;color:var(--muted);margin:0;letter-spacing:-.01em;}

  /* 본문 */
  main.wrap{padding-top:24px;padding-bottom:56px;}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;min-width:0;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    box-shadow:var(--shadow);overflow:hidden;}
  .card-head{display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid var(--border);}
  .card-head .src{width:24px;height:24px;border-radius:7px;color:#fff;font-weight:900;font-size:13px;
    display:flex;align-items:center;justify-content:center;}
  .card-head h2{font-size:15.5px;font-weight:900;letter-spacing:-.02em;margin:0;}
  .card-head .time{margin-left:auto;font-size:11px;color:var(--muted);}
  ol.rank{list-style:none;margin:0;padding:6px 8px 10px;}
  .rowbtn{width:100%;text-align:left;background:none;border:0;cursor:pointer;font:inherit;color:inherit;
    display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;}
  .rowbtn:hover{background:var(--bg);}
  .rowbtn:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
  .caret{flex-shrink:0;color:var(--muted);font-size:11px;transition:transform .2s;}
  li.open .caret{transform:rotate(180deg);}
  .panel{max-height:0;overflow:hidden;transition:max-height .28s ease;}
  li.open .panel{max-height:600px;}
  .panel-in{padding:2px 14px 14px;}
  .ai{font-size:13px;line-height:1.6;background:var(--accent-soft);border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;margin:4px 0 10px;color:var(--text);}
  .ai b{color:var(--accent);font-weight:700;}
  .news2{display:flex;gap:10px;align-items:center;padding:9px 0;text-decoration:none;color:var(--text);
    border-top:1px solid var(--border);}
  .thumb2{flex-shrink:0;width:50px;height:50px;border-radius:8px;object-fit:cover;
    background:var(--bg);border:1px solid var(--border);}
  .ntw{flex:1;min-width:0;}
  .nt2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    font-size:13px;line-height:1.4;}
  .src2{display:block;font-size:11px;color:var(--muted);margin-top:2px;}
  .plinks{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:11px;}
  .plinks a{font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;}

  .rn{flex-shrink:0;width:22px;text-align:center;font-size:16px;font-weight:900;color:var(--muted);}
  .rn.top{color:var(--accent);}
  .kw{flex:1;min-width:0;font-size:14.5px;font-weight:500;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .vol{flex-shrink:0;font-size:11px;color:var(--muted);}
  .bd{flex-shrink:0;min-width:26px;text-align:right;font-size:11px;font-weight:700;}
  .bd.up{color:var(--up);} .bd.down{color:var(--down);} .bd.flat{color:var(--muted);font-weight:400;}

  .foot-brand{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}

  footer nav{display:flex;gap:18px;font-size:13px;}
  footer nav a{color:var(--muted);text-decoration:none;}

const SEARCH_BASE = {
  google: 'https://www.google.com/search?q=',
  naver:  'https://search.naver.com/search.naver?query='
};

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function badgeHTML(it){
  if(it.move === 'new')  return '<span class="bd new">N</span>';
  if(it.move === 'up')   return '<span class="bd up">▲'+it.delta+'</span>';
  if(it.move === 'down') return '<span class="bd down">▼'+it.delta+'</span>';
  return '<span class="bd flat">–</span>';
}

function panelBody(it, source){
  let h = '';
  if(it.aiSummary) h += '<div class="ai"><b>🤖 AI 요약</b><br>'+esc(it.aiSummary)+'</div>';
  const news = it.news || [];
  if(news.length){
    h += news.map(function(n){
      const thumb = n.image ? '<img class="thumb2" src="'+esc(n.image)+'" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()">' : '';
      return '<a class="news2" href="'+esc(n.url)+'" target="_blank" rel="noopener">'+thumb
        + '<span class="ntw"><span class="nt2">'+esc(n.title)+'</span><span class="src2">'+esc(n.source)+'</span></span></a>';
    }).join('');
  } else if(!it.aiSummary){
    h += '<div class="src2" style="padding:6px 0;">관련 정보가 없어요.</div>';
  }
  let links = '<a href="'+SEARCH_BASE.naver+encodeURIComponent(it.keyword)+'" target="_blank" rel="noopener">네이버 검색 →</a>'
            + '<a href="'+SEARCH_BASE.google+encodeURIComponent(it.keyword)+'" target="_blank" rel="noopener">구글 검색 →</a>';
  if(source==='naver' && it.summary) links += '<a href="'+esc(it.summary)+'" target="_blank" rel="noopener">AI 요약 보기 →</a>';
  h += '<div class="plinks">'+links+'<button type="button" class="closeb" onclick="closeRow(this)">닫기 ▲</button></div>';
  return h;
}

function renderList(id, source){
  const items = DATA[source] || [];
  const el = document.getElementById(id);
  el.innerHTML = items.length ? items.map(function(it){
    const rank = it.rank;
    const vol = (source==='google' && it.traffic) ? '<span class="vol">'+esc(it.traffic)+'</span>' : '';
    return '<li>'
      + '<div class="rowbtn" tabindex="0" role="button" aria-expanded="false" onclick="toggleRow(this)"'
      + ' onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();this.click();}">'
        + '<span class="rn'+(rank<=3?' top':'')+'">'+rank+'</span>'
        + '<span class="kw">'+esc(it.keyword)+'</span>'
        + vol + badgeHTML(it) + '<span class="caret">▾</span>'
      + '</div>'
      + '<div class="panel"><div class="panel-in">'+panelBody(it, source)+'</div></div>'
      + '</li>';
  }).join('') : '<li style="padding:14px;color:var(--muted);font-size:13px;">데이터를 불러오지 못했어요.</li>';
}

function toggleRow(btn){
  const li = btn.closest('li'), ol = li.parentElement;
  const wasOpen = li.classList.contains('open');
  ol.querySelectorAll('li.open').forEach(function(o){
    o.classList.remove('open');
    const b = o.querySelector('.rowbtn'); if(b) b.setAttribute('aria-expanded','false');
  });
  if(!wasOpen){ li.classList.add('open'); btn.setAttribute('aria-expanded','true'); }
}
function closeRow(btn){
  const li = btn.closest('li'); li.classList.remove('open');
  const b = li.querySelector('.rowbtn'); if(b) b.setAttribute('aria-expanded','false');
}
function openFirst(id){
  const li = document.querySelector('#'+id+' li');
  if(li){ li.classList.add('open'); const b=li.querySelector('.rowbtn'); if(b) b.setAttribute('aria-expanded','true'); }
}

renderList('listGoogle', 'google');
renderList('listNaver', 'naver');
openFirst('listGoogle');
openFirst('listNaver');
const label = (DATA.updatedAt || '') + ' 기준';
document.getElementById('timeGoogle').textContent = label;
document.getElementById('timeNaver').textContent = label;
if(DATA.naverSource === 'datalab'){ document.getElementById('footSrc').textContent = '데이터 출처: 구글 트렌드 · 네이버 데이터랩'; }

/* 다크/라이트 토글 (localStorage 'theme' — 블로그와 공유) */
(function(){
  const btn = document.getElementById('themeBtn');
  function cur(){ return document.documentElement.getAttribute('data-theme') || 'light'; }
  function apply(t){ document.documentElement.setAttribute('data-theme', t);
    try{ localStorage.setItem('theme', t); }catch(e){}
    btn.textContent = (t === 'dark') ? '☀️' : '🌙'; }
  btn.textContent = (cur()==='dark') ? '☀️' : '🌙';
  btn.addEventListener('click', function(){ apply(cur()==='dark' ? 'light':'dark'); });
})();
